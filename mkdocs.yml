site_name: Computational Entropy
site_description: Computational entropy, load, and emergent-gravity research (preliminary)
site_url: https://cyotee.github.io/computational-entropy/
repo_url: https://github.com/cyotee/computational-entropy
repo_name: cyotee/computational-entropy
# Synced pages are generated copies; edit canons in the research tree instead
edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
      # Research sources often use "$  expr  $"; default smart_dollar rejects those.
      smart_dollar: false
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

nav:
  - Home: index.md
  - How to read: how-to-read.md
  - Non-claims: non-claims.md
  - The paper:
      - Title & abstract: papers/chapters/00-front-matter.md
      - 1. Introduction: papers/chapters/01-introduction.md
      - 2. Related work: papers/chapters/02-related-work.md
      - 3. Results: papers/chapters/03-results.md
      - 4. Foundations: papers/chapters/04-foundations.md
      - 5. Classical microstructure: papers/chapters/05-classical-microstructure.md
      - 6. Channel, load & master equation: papers/chapters/06-channel-load-master-equation.md
      - 7. Newton recovery (Path J/M): papers/chapters/07-newton-recovery.md
      - 8. Euclidean dual (ACD-EW): papers/chapters/08-euclidean-dual.md
      - 9. Continuum GfE contact: papers/chapters/09-continuum-gfe.md
      - 9.5 GfE applications: papers/chapters/09b-gfe-applications.md
      - 10. Synthesis & open program: papers/chapters/10-synthesis.md
      - 11. Final conclusions: papers/chapters/11-conclusions.md
      - Appendix A. Witnesses: papers/chapters/appendix-a.md
      - Appendix B. Claims checklist: papers/chapters/appendix-b.md
      - Appendix C. Open avenues: papers/chapters/appendix-c.md
      - References: papers/chapters/references.md
      - Full paper (single page): papers/paper-full.md
  - Quick reference:
      - Computational entropy: foundations/computational-entropy.md
      - Channel, load, master equation: emergent-gravity/master-equation.md
      - Newtonian recovery: emergent-gravity/newtonian-recovery.md
      - Claims: synthesis/claims.md
      - Conclusions: synthesis/conclusions.md
      - Open avenues: synthesis/open-avenues.md
      - Glossary: glossary.md
  - Supporting reports:
      - Final program report: papers/final-report.md
      - Publishable draft: papers/publishable.md
      - Progress: progress.md
